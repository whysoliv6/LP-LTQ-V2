<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planilha de Controle Financeiro Empresarial | LTQ Educação</title>
  <meta name="description" content="Tenha clareza total sobre o dinheiro da sua empresa. Saiba exatamente quanto está ganhando ou perdendo todo mês com a Planilha de Controle Financeiro da LTQ Educação.">

  <link rel="preload" href="fonts/Poppins-Black.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="fonts/Poppins-Medium.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="imgs/home.png" as="image">

  <link rel="stylesheet" href="css/global.css">
</head>
<body>

  <main>
    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero__card">
        <span class="hero__badge">Planilha de controle financeiro!</span>

        <div class="hero__grid">
          <div class="hero__content">
            <h1 class="hero__title">
              A ferramenta que você precisa para ter <span class="hero__title-highlight">clareza</span> total sobre o dinheiro da sua empresa!
            </h1>
            <p class="hero__subtitle">
              Sem mais dúvidas. Sem mais achismo. Saiba exatamente quanto sua empresa está ganhando ou perdendo a cada mês.
            </p>
          </div>

          <div class="hero__media">
            <img
              class="hero__image"
              src="imgs/home.png"
              alt="Notebook exibindo o painel principal da Planilha de Controle Financeiro da LTQ Educação, com botões de acesso a Gráficos, Relatórios, Fluxo de Caixa, Plano de Contas, Lançar Receitas e Lançar Despesas"
              width="1500"
              height="984"
              fetchpriority="high"
            >
          </div>
        </div>
      </div>

      <p class="hero__watermark" aria-hidden="true">LTQ Educação</p>
    </section>
  </main>

</body>
</html>
